{% extends 'baseedu.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-success text-white">
        <h4>✍️ Cadastro de Autor</h4>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}

            <button class="btn btn-success">Salvar</button>
            <a href="/edu/autores/" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
</div>
{% endblock %}
