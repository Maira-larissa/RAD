<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">📚 Biblioteca</span>
        <div>
            {% if not request.user.is_authenticated %}
                <a href="/edu/signin/" class="btn btn-outline-light btn-sm">Entrar</a>
                <a href="/edu/signup/" class="btn btn-outline-light btn-sm">Registrar</a>
            {% else %}
            <span class="navbar-brand">Olá, {{ request.user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
            {% endif %}
            <a href="/edu/livros/" class="btn btn-outline-light btn-sm">Livros</a>
            <a href="/edu/autores/" class="btn btn-outline-light btn-sm">Autores</a>
            <a href="/edu/editoras/" class="btn btn-outline-light btn-sm">Editoras</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
